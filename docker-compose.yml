services:
  goa-gateway:
    build: .
    image: goa-gateway:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://host.docker.internal:8761/eureka/
    networks:
      - goa
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  goa:
    external: true

#> docker compose up --build -d